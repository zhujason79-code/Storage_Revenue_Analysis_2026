<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年独立储能收益分析 - 优化版</title>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #e67e22;
            --accent-color: #9b59b6;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; margin: 0; padding: 20px; background-color: var(--bg-color); color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        h1 { text-align: center; font-size: 28px; margin-bottom: 10px; color: #1a1a1a; }
        .subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 16px; }
        .chart-wrapper { position: relative; height: 500px; width: 100%; margin-bottom: 40px; }
        .grid-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .info-card { padding: 15px; border-radius: 10px; background: #f8fafc; border-top: 4px solid var(--primary-color); }
        .info-card h3 { margin-top: 0; font-size: 16px; color: #333; }
        .info-card p { font-size: 14px; margin-bottom: 0; line-height: 1.5; color: #555; }
        .disclaimer { margin-top: 30px; padding: 15px; font-size: 13px; color: #888; background: #fff; border: 1px dashed #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>2026年四省独立储能收益构成深度分析</h1>
        <p class="subtitle">100MW/200MWh基准 | 基于2026-03-20实测电价与政策退坡评估</p>
        <div class="chart-wrapper">
            <canvas id="revenueChart"></canvas>
        </div>
        <div class="grid-info">
            <div class="info-card" style="border-top-color: #3498db;">
                <h3>甘肃 (退坡模式)</h3>
                <p>容量补偿跌至80元/kW，收入缩水74%。需强化高效率现货套利。</p>
            </div>
            <div class="info-card" style="border-top-color: #e67e22;">
                <h3>蒙西 (收益冠军)</h3>
                <p>凭借0.28元/kWh放电补贴，5720万总营收稳居四省榜首。</p>
            </div>
            <div class="info-card" style="border-top-color: #9b59b6;">
                <h3>山西 (调频溢价)</h3>
                <p>调频里程费贡献780万，溢价全国最高。现货与调频双轮驱动。</p>
            </div>
            <div class="info-card" style="border-top-color: #27ae60;">
                <h3>山东 (极致套利)</h3>
                <p>租赁均价跌破80元/kW。必须依托年均550次高频充放保全收益。</p>
            </div>
        </div>
        <div class="disclaimer">
            <strong>📊 数据汇总说明：</strong> 本模型基于2026年3月最新退坡政策及XMODATA实测。
        </div>
    </div>
    <script>
        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['甘肃', '蒙西', '山西', '山东'],
                datasets: [
                    { label: '现货套利收益 (万元)', data: [2850, 3100, 2900, 3400], backgroundColor: '#3498db', borderRadius: 4 },
                    { label: '容量补偿/租赁/补贴 (万元)', data: [800, 2200, 1800, 1600], backgroundColor: '#e67e22', borderRadius: 4 },
                    { label: '辅助服务(调频/备用) (万元)', data: [550, 420, 780, 500], backgroundColor: '#9b59b6', borderRadius: 4 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'top' }, tooltip: { mode: 'index' } },
                scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, title: { display: true, text: '年度收益 (万元)' } } }
            }
        });
    </script>
</body>
</html>
